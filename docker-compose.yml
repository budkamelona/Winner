services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-botuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-botpassword}
      POSTGRES_DB: ${POSTGRES_DB:-winner_bot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-botuser} -d ${POSTGRES_DB:-winner_bot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-botuser}:${POSTGRES_PASSWORD:-botpassword}@db/${POSTGRES_DB:-winner_bot}
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_USERNAME: ${BOT_USERNAME}
      ADMIN_TELEGRAM_ID: ${ADMIN_TELEGRAM_ID}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  bot:
    build: .
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_USERNAME: ${BOT_USERNAME}
      ADMIN_TELEGRAM_ID: ${ADMIN_TELEGRAM_ID}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-botuser}:${POSTGRES_PASSWORD:-botpassword}@db/${POSTGRES_DB:-winner_bot}
      TIMEZONE: ${TIMEZONE:-UTC}
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - .:/app

volumes:
  postgres_data:
